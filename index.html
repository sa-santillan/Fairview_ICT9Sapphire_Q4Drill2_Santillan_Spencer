<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1504370805625-d32c54b16100?auto=format&fit=crop&q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background-color: #212529;
            border: 2px solid #ffc107;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
        }

        .instruction-box {
            font-size: 0.85rem;
            color: #adb5bd;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 class="text-warning mb-3">Heat Index Checker</h2>

        <details>
            <summary>Note</summary>
            <p class="instruction-box">
                Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.
            </p>
        </details>

        <div class="mb-3 mt-3">
            <label class="form-label">Degree in °C</label>
            <input type="number" id="tempInput" class="form-control" placeholder="Input degree value">
        </div>

        <div class="mb-3">
            <label class="form-label">Humidity in %</label>
            <input type="number" id="humidInput" class="form-control" placeholder="Input percentage value">
        </div>

        <button class="btn btn-warning w-100 fw-bold" onclick="checkHI()">Check</button>

    </div>

    <script>
        function checkHI() {
          
            var temp = parseFloat(document.getElementById("tempInput").value);
            var humid = parseFloat(document.getElementById("humidInput").value);
            
        
            if (isNaN(temp) || isNaN(humid)) {
                alert("Please fill in both fields with numbers.");
                return;
            }

            var HeatIndex = temp + (0.33 * humid) - 4;
            var status = "";

            switch (true) {
                case (HeatIndex <= 27):
                    status = "Comfortable / Cool";
                    break;
                case (HeatIndex >= 28 && HeatIndex <= 32):
                    status = "Warm";
                    break;
                case (HeatIndex >= 33 && HeatIndex <= 37):
                    status = "Hot";
                    break;
                case (HeatIndex >= 38 && HeatIndex <= 41):
                    status = "Very Hot / Caution";
                    break;
                case (HeatIndex >= 42):
                    status = "Extreme Heat / Danger";
                    break;
                default:
                    status = "Cannot be determined...";
            }

            alert("Heat Index: " + HeatIndex.toFixed(1) + "°C\nStatus: " + status);
        }
    </script>
</body>
</html>
